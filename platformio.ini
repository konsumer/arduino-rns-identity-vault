; PlatformIO Project Configuration File
;
; identity_vault — password-protected identity + encrypted message storage example
;
; Demonstrates the full flow:
;   1. password_protect / password_open  →  persist identity key on SD
;   2. encstore_write / encstore_read    →  store messages encrypted to that identity
;
; Requires an SD card. Pin assignments are set per-board via build_flags below.

[env]
monitor_speed = 115200
upload_speed  = 460800
build_type    = debug
build_flags =
	-Wall
	-Wno-missing-field-initializers
	-Wno-format
	-DUSTORE_USE_UNIVERSALFS
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	https://github.com/attermann/microReticulum.git
	https://github.com/konsumer/arduino-rns-password.git
	https://github.com/konsumer/arduino-rns-encrypted-store.git

[env:ttgo-t-beam]
framework = arduino
platform   = espressif32
board      = ttgo-t-beam
board_build.partitions = no_ota.csv
build_flags =
	${env.build_flags}
	-Wextra
	-DBOARD_ESP32
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env.lib_deps}
monitor_filters = esp32_exception_decoder

[env:lilygo_tbeam_supreme]
framework = arduino
platform   = espressif32
board      = t-beams3-supreme
board_build.partitions = no_ota.csv
build_flags =
	${env.build_flags}
	-Wextra
	-DBOARD_ESP32
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env.lib_deps}
monitor_filters = esp32_exception_decoder

[env:ttgo-lora32-v21]
framework = arduino
platform   = espressif32
board      = ttgo-lora32-v21
board_build.partitions = no_ota.csv
build_flags =
	${env.build_flags}
	-Wextra
	-DBOARD_ESP32
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env.lib_deps}
monitor_filters = esp32_exception_decoder

; M5Stack CardPuter with card-compatible SD wiring
[env:cardputeradv]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
board_build.partitions = no_ota.csv
framework = arduino
upload_protocol = esp-builtin
build_flags =
	${env.build_flags}
	-DESP32S3
	-DBOARD_ESP32
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-Wextra
	-DMSGPACK_USE_BOOST=OFF
	-DSD_CS_PIN=12
	-DBUTTON_PIN=0
	-DSPI_SCK=40
	-DSPI_MISO=39
	-DSPI_MOSI=14
	-DLORA_CS=5
	-DSD_SPEED=40000000
lib_deps =
	${env.lib_deps}
monitor_filters = esp32_exception_decoder
